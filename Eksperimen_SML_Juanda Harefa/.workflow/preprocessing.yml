name: Automate Preprocessing - Juanda Harefa

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  preprocessing:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy matplotlib seaborn scikit-learn mlflow

      - name: Run Automate Preprocessing
        run: |
          python "Eksperimen_SML_Juanda Harefa/preprocessing/automate_Juanda-Harefa.py"

      - name: Upload Preprocessed Dataset
        uses: actions/upload-artifact@v3
        with:
          name: preprocessed-dataset
          path: "Eksperimen_SML_Juanda Harefa/preprocessing/churn_preprocessing/"
          retention-days: 7
