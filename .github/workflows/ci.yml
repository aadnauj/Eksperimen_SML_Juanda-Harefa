name: Workflow CI - Churn MLflow

on:
  push:
    branches:
      - main
    paths:
      - 'Workflow-CI/**'
  workflow_dispatch:

jobs:
  train-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mlflow dagshub pandas numpy matplotlib seaborn scikit-learn requests

      - name: Run MLflow Project Training
        env:
          MLFLOW_TRACKING_URI: https://dagshub.com/aadnauj/Eksperimen_SML_Juanda-Harefa.mlflow
          MLFLOW_TRACKING_USERNAME: aadnauj
          MLFLOW_TRACKING_PASSWORD: ${{ secrets.DAGSHUB_TOKEN }}
          DAGSHUB_USER_TOKEN: ${{ secrets.DAGSHUB_TOKEN }}
        run: |
          mlflow run Workflow-CI/MLProject --env-manager=local -P n_estimators=100 -P max_depth=10 -P random_state=42 -P test_size=0.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker Image with MLflow
        env:
          MLFLOW_TRACKING_URI: https://dagshub.com/aadnauj/Eksperimen_SML_Juanda-Harefa.mlflow
          MLFLOW_TRACKING_USERNAME: aadnauj
          MLFLOW_TRACKING_PASSWORD: ${{ secrets.DAGSHUB_TOKEN }}
        run: |
          mlflow models build-docker --model-uri "models:/RandomForest_WorkflowCI/latest" --name "aadnauj/workflow-ci:latest" --env-manager=local

      - name: Push Docker Image to Docker Hub
        run: |
          docker push aadnauj/workflow-ci:latest

      - name: Upload Training Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: training-artifacts-${{ github.sha }}
          path: mlruns/
          retention-days: 30
